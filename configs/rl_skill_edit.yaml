method: rl_skill_edit
runtime: spreadsheet
seed: 42

openrouter:
  base_url: https://openrouter.ai/api/v1

cost_tracking:
  enabled: true
  cost_per_1k_tokens:
    anthropic/claude-3-haiku: 0.0008
    anthropic/claude-opus-4.5: 0.015

student:
  model: anthropic/claude-3-haiku
  temperature: 0.0
  max_tokens: 4096
  max_steps: 3

editor:
  model: anthropic/claude-opus-4.5
  temperature: 0.0
  max_tokens: 4096

skill_identity:
  skill_id: main
  name: main
  description: Spreadsheet manipulation skill optimized by RL-Skill-Edit.

paths:
  initial_skill: data/initial_skill.md
  train_manifest: data/private/train.json
  validation_manifest: data/private/validation.json
  test_manifest: data/private/test.json
  output_dir: results/rl_skill_edit
  rl_skill: results/rl_skill_edit/rl_skill_edit/best_rl_skill.md
  rl_summary: results/rl_skill_edit/rl_skill_edit/rl_optimization_summary.json
  rl_provenance: results/rl_skill_edit/rl_skill_edit/freeze_provenance.json

split_sizes:
  train: 60
  validation: 20
  test: 20

optimizer:
  episodes: 12
  horizon: 2
  minibatch_size: 26
  validation_interval: 1

action_space:
  max_modules: 16

policy:
  hidden_dim: 128
  learning_rate: 0.001
  gamma: 0.95
  entropy_coef: 0.01
  value_coef: 0.5
  max_grad_norm: 1.0
  normalize_advantages: true

reward:
  beta_len: 0.001
  beta_edit: 0.001
  beta_invalid: 0.2

patch_limits:
  max_changed_tokens: 400
  max_length_growth_tokens: 200
  max_skill_tokens: 10000

evaluation:
  metric: mixed
  mixed_weight: 0.5
  success_threshold: 0.8
  train_repetitions: 1
  validation_repetitions: 3
  report_train_repetitions: 1
  test_repetitions: 3
  bootstrap_samples: 5000
  use_cache: true
  paired_tasks: true
  save_task_level_results: true
  blind: true

budget:
  student_rollouts: 2760
  editor_calls: 25
  evaluator_calls: 73
  input_tokens: 55000000
  output_tokens: 12000000
  wall_time_seconds: 60000.0
